syntax = "proto3";

package calculadora;

service Calculadora {
    rpc add (Operacion) returns (Resultado);
    rpc sub (Operacion) returns (Resultado);
    rpc mul (Operacion) returns (Resultado);
    rpc div (Operacion) returns (Resultado);
}

message Operacion {
    float a = 1;
    float b = 2;
}

message Resultado {
    float valor = 1;
}